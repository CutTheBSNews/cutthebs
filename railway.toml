[build]
builder = "NIXPACKS"
nixpacksPlan = "chromium ffmpeg"
 
[build.env]
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium-browser"
 
[deploy]
startCommand = "node src/daily.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
 
[[services]]
name = "cutthebs-daily"
 
[services.cron]
schedule = "0 17 * * *"
command = "node src/daily.js"
